name: "Java to Kotlin Conversion Pipeline"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  OUTPUT_DIR: "converted-kotlin"

jobs:
  j2k-convert:
    name: "Convert Java to Kotlin"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Start virtual display
        run: |
          sudo apt-get install -y xvfb > /dev/null
          Xvfb :99 -screen 0 1280x800x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Run J2K conversion — petclinic
        run: |
          mkdir -p logs
          chmod +x gradlew
          ./gradlew runIde \
            -PsourceDir="${GITHUB_WORKSPACE}/test-projects/petclinic/java/spring-petclinic/src" \
            -PoutputDir="${GITHUB_WORKSPACE}/${OUTPUT_DIR}/spring-petclinic" \
            -PprojectDir="${GITHUB_WORKSPACE}/test-projects/petclinic/java/spring-petclinic" \
            --no-daemon \
            --stacktrace \
            2>&1 | tee logs/j2k-petclinic.log
        timeout-minutes: 10

      - name: Run J2K conversion — microbenchmark edge cases
        run: |
          ./gradlew runIde \
            -PsourceDir="${GITHUB_WORKSPACE}/test-projects/microbenchmark/src" \
            -PoutputDir="${GITHUB_WORKSPACE}/${OUTPUT_DIR}/microbenchmark" \
            -PprojectDir="${GITHUB_WORKSPACE}/test-projects/microbenchmark" \
            --no-daemon \
            --stacktrace \
            2>&1 | tee logs/j2k-microbenchmark.log
        timeout-minutes: 5

      - name: Upload J2K logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: j2k-logs
          path: |
            logs/
            .intellijPlatform/sandbox/j2k/IC-2024.1.7/log/idea.log
            build/idea-sandbox/system/log/idea.log
          retention-days: 30

      - name: (Failure) Show J2K logs
        if: failure()
        run: |
          cat logs/j2k-petclinic.log
          cat logs/j2k-microbenchmark.log 2>/dev/null || true
          echo "=== idea.log ==="
          cat build/idea-sandbox/system/log/idea.log 2>/dev/null || echo "(idea.log 1 not found)"
          cat .intellijPlatform/sandbox/j2k/IC-2024.1.7/log/idea.log 2>/dev/null || echo "(idea.log 2 not found)"

      - name: List converted Kotlin files
        if: always()
        run: |
          echo "=== petclinic ==="
          find "${OUTPUT_DIR}/spring-petclinic" -name "*.kt" 2>/dev/null | sort || echo "(none found)"
          echo "Total: $(find ${OUTPUT_DIR}/spring-petclinic -name '*.kt' 2>/dev/null | wc -l) file(s)"
          echo ""
          echo "=== microbenchmark ==="
          find "${OUTPUT_DIR}/microbenchmark" -name "*.kt" 2>/dev/null | sort || echo "(none found)"
          echo "Total: $(find ${OUTPUT_DIR}/microbenchmark -name '*.kt' 2>/dev/null | wc -l) file(s)"

      - name: Upload converted Kotlin sources
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: converted-kotlin-sources
          retention-days: 30
          path: ${{ env.OUTPUT_DIR }}/

      - name: Validate output
        run: |
            count=$(find ${OUTPUT_DIR} -name "*.kt" | wc -l)
            [ "$count" -gt 0 ] || (echo "No files converted" && exit 1)
            empty_files=$(find ${OUTPUT_DIR} -name "*.kt" -empty)
            if [ -n "$empty_files" ]; then
              echo "Empty files found:"
              echo "$empty_files"
              exit 1
            fi

      - name: Evaluate — petclinic
        run: |
          ./gradlew :evaluator:run \
            --args="${GITHUB_WORKSPACE}/${OUTPUT_DIR}/spring-petclinic" \
            --no-daemon

      - name: Evaluate — microbenchmark edge cases
        run: |
          ./gradlew :evaluator:run \
            --args="${GITHUB_WORKSPACE}/${OUTPUT_DIR}/microbenchmark" \
            --no-daemon

      - name: Upload evaluation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evaluation-report
          path: evaluation-report.json
          retention-days: 30
